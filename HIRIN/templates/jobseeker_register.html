{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Job Seeker Registration
    </title>

    <link rel="stylesheet"
          href="{% static 'css/register.css' %}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="register-box">

    <h1>Create Account</h1>

    <p>
        Start your job search journey with HIRIN'
    </p>

    {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="fullname"
               placeholder="Full Name"
               required>

        <input type="email"
               name="email"
               placeholder="Email Address"
               required>

        <input type="password"
               name="password1"
               placeholder="Password"
               required>

        <input type="password"
               name="password2"
               placeholder="Confirm Password"
               required>

        <button type="submit"
                class="register-btn">

            Create Account

        </button>

    </form>

    <div class="divider">
        OR
    </div>

    <button class="google-btn">

        <i class="fa-brands fa-google"></i>

        Continue with Google

    </button>

    <div class="login-link">

        Already have an account?

        <a href="/login/">
            Login
        </a>

    </div>

</div>

</body>

</html>
