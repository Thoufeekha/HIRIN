{% extends "recruiter/recruiter_base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/edit_job.css' %}">
{% endblock %}

{% block content %}

<div class="page-header">
    <h1>Edit Job</h1>
</div>

<div class="edit-job-form-container">

    <form method="post" class="edit-job-form">
        {% csrf_token %}

        <div class="form-group">
            <label for="title">Job Title</label>
            <input type="text" id="title" name="title" value="{{ job.title }}" required>
        </div>

        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" value="{{ job.location }}" required>
        </div>

        <div class="form-group">
            <label for="employment_type">Employment Type</label>
            <select id="employment_type" name="employment_type">
                <option value="Full Time" {% if job.employment_type == "Full Time" %}selected{% endif %}>Full Time</option>
                <option value="Part Time" {% if job.employment_type == "Part Time" %}selected{% endif %}>Part Time</option>
                <option value="Internship" {% if job.employment_type == "Internship" %}selected{% endif %}>Internship</option>
                <option value="Contract" {% if job.employment_type == "Contract" %}selected{% endif %}>Contract</option>
            </select>
        </div>

        <div class="form-group">
            <label for="salary">Salary</label>
            <input type="text" id="salary" name="salary" value="{{ job.salary }}">
        </div>

        <div class="form-group">
            <label for="skills">Skills</label>
            <textarea id="skills" name="skills" rows="3">{{ job.skills }}</textarea>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="6">{{ job.description }}</textarea>
        </div>

        <div class="form-group">
            <label for="valid_until">Valid Until</label>
            <input type="date" id="valid_until" name="valid_until" value="{{ job.valid_until|date:'Y-m-d' }}">
        </div>

       

        <div class="form-actions">
            <button type="submit" class="btn-save">Save Changes</button>
            <a href="{% url 'manage_jobs' %}" class="btn-cancel">Cancel</a>
        </div>

    </form>

</div>

{% endblock %}
