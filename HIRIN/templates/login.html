{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Login - HIRIN'
    </title>

    <link rel="stylesheet"
          href="{% static 'css/login.css' %}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="login-box">

    <h1>Welcome Back</h1>

    <p>
        Login to your HIRIN' account
    </p>

   {% if messages %}
    {% for message in messages %}
        <div class="error-message">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

{% if error %}
    <div class="error-message">
        {{ error }}
    </div>
{% endif %}

    <form method="POST">

        {% csrf_token %}

        <input type="email"
               name="email"
               placeholder="Email Address"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit"
                class="login-btn">

            Login

        </button>

    </form>

    <div class="divider">
        OR
    </div>

    <button class="google-btn">

        <i class="fa-brands fa-google"></i>

        Continue with Google

    </button>

    <div class="signup-link">

        Don't have an account?

        <a href="/getstarted/">
            Sign Up
        </a>

    </div>

</div>

</body>

</html>
