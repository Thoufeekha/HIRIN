{% extends 'base.html' %}
{% load static %}

{% block title %}
HIRIN'
{% endblock %}

{% block content %}

<section class="hero-section">

    <!-- Left Image -->

    <div class="hero-left">

        <img src="{% static 'imgs/resume-illustration.png' %}"
             alt="Resume Illustration">

    </div>

    <!-- Center Content -->

    <div class="hero-center">

        <div class="hero-logo">

            <img src="{% static 'imgs/tie-icon.png' %}"
                 alt="Tie Icon">

            <h1>HIRIN'</h1>

        </div>

        <h2>
            Your Next Career Move Starts Here
        </h2>

        <p>
            Your smart job search assistant. Discover opportunities,
            connect with top companies, and build your career with AI.
        </p>

        <a href="/getstarted/"
           class="hero-btn">

            Get Started →

        </a>

    </div>

    <!-- Right Image -->

    <div class="hero-right">

        <img src="{% static 'imgs/briefcase-illustration.png' %}"
             alt="Briefcase Illustration">

    </div>

</section>

{% endblock %}
